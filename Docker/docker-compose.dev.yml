services:
  web:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - "4173:4173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_FIXTURE_API_URL=http://localhost:8000/api.php
    depends_on:
      - php

  php:
    image: php:8.3-cli
    working_dir: /app
    volumes:
      - ./api.php:/app/api.php:ro
      - ./fixture.json:/app/fixture.json
    ports:
      - "8000:8000"
    command: php -S 0.0.0.0:8000 api.php
